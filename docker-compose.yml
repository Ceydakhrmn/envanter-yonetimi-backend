services:
  postgres:
    image: postgres:16-alpine
    container_name: efsora-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-envanter_db}
      POSTGRES_USER: ${POSTGRES_USER:-efsora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - efsora-network

networks:
  efsora-network:
    driver: bridge
