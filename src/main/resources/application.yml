logging:
  level:
    root: INFO
    com.example.demo: DEBUG

spring:
  application:
    name: EfsoraBackend
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/envanter_db}
    username: ${SPRING_DATASOURCE_USERNAME:efsora_user}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  security:
    enabled: false

jwt:
  secret: replace-this-dev-secret-with-env-value-please-1234567890
  expiration: 86400000
  refresh-expiration: 2592000000

app:
  backend-public-url: http://localhost:8081
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${APP_MAIL_FROM:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}